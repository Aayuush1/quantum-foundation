name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
      fail-fast: false

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install qiskit
        pip install qiskit-aer || pip install qiskit-aer --no-build-isolation
        pip install matplotlib numpy

    - name: Test syntax
      run: |
        python -m py_compile 01-single-qubit-gates/single_qubit_gates.py
        python -m py_compile 02-multi-qubit-gates/multi_qubit_gates.py
        python -m py_compile 03-quantum-algorithms/quantum_algorithms.py
        python -m py_compile 04-quantum-error-correction/quantum_error_correction.py
        python -m py_compile 05-quantum-ml/quantum_ml.py
        python -m py_compile 06-quantum-simulation/quantum_simulation.py

    - name: Test imports
      run: |
        python -c "from qiskit import QuantumCircuit; from qiskit_aer import AerSimulator; print('All imports OK')"

    - name: Run module 01
      run: python 01-single-qubit-gates/single_qubit_gates.py
      continue-on-error: true

    - name: Run module 02
      run: python 02-multi-qubit-gates/multi_qubit_gates.py
      continue-on-error: true

    - name: Run module 03
      run: python 03-quantum-algorithms/quantum_algorithms.py
      continue-on-error: true

    - name: Run module 04
      run: python 04-quantum-error-correction/quantum_error_correction.py
      continue-on-error: true

    - name: Run module 05
      run: python 05-quantum-ml/quantum_ml.py
      continue-on-error: true

    - name: Run module 06
      run: python 06-quantum-simulation/quantum_simulation.py
      continue-on-error: true
